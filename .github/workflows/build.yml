name: build-windows

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  syntax-check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Python syntax check
      run: python3 -m py_compile game_input_tester.py

  smoke-test:
    name: Smoke test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Smoke import
      run: python -c "import ast; ast.parse(open('game_input_tester.py').read()); print('OK')"
    - name: Verify key APIs
      run: |
        python -c "
        src = open('game_input_tester.py').read()
        for api in ['SCANCODE', 'send_scan_code', 'CooldownPlayer', 'ScriptPlayer',
                    'register_hotkeys', 'Recorder', 'MappingDialog', 'EditConfigDialog',
                    'execute_min', 'execute_max', 'round_timeout_sec', '_weighted_pick',
                    'class App']:
            assert api in src, f'Missing: {api}'
        print('All key APIs present')
        "

  build-exe:
    name: Build EXE (PyInstaller)
    runs-on: windows-latest
    needs: smoke-test
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build single-file EXE
      run: |
        pyinstaller --onefile --windowed --name GameInputTester ^
          --add-data "samples;samples" ^
          --collect-all tkinter ^
          game_input_tester.py

    - name: List build output
      run: dir dist

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameInputTester-win-x64
        path: dist/GameInputTester.exe
        if-no-files-found: error
        retention-days: 30
