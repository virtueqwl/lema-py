name: build-windows

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  syntax-check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Python syntax check
      run: python3 -m py_compile game_input_tester.py

  smoke-test:
    name: Smoke test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Smoke import
      run: |
        python -c "import ast; ast.parse(open('game_input_tester.py', encoding='utf-8').read()); print('syntax OK')"
        # 实际 import（macOS 没法跑，但 Linux 跑得到 — Windows 才需要真实 Win32）
        # 在 Windows runner 上这步会因 win32 API 加载失败而崩，预期内；这里只验证语法
    - name: Verify key APIs
      run: |
        python -c "
        src = open('game_input_tester.py', encoding='utf-8').read()
        for api in ['SCANCODE', 'send_scan_code', 'CooldownPlayer', 'ScriptPlayer',
                    'Recorder', 'MappingDialog', 'EditConfigDialog',
                    'execute_min', 'execute_max', 'round_timeout_sec', '_weighted_pick',
                    'class App', '_app_dir', 'import sys', '_on_hotkey', 'HOTKEY_VK_TO_ACTION']:
            assert api in src, f'Missing: {api}'
        # 旧的 register_hotkeys 已删除（钩子替代）
        assert 'def register_hotkeys' not in src, 'register_hotkeys 应已删除'
        print('All key APIs present')
        "

  build-exe:
    name: Build EXE (PyInstaller)
    runs-on: windows-latest
    needs: smoke-test
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build single-file EXE
      shell: pwsh
      run: >
        pyinstaller --onefile --windowed --name GameInputTester
        --add-data "samples;samples"
        --collect-all tkinter
        game_input_tester.py

    - name: Copy samples to dist/configs
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist/configs
        Copy-Item samples/*.json dist/configs/

    - name: List build output
      run: dir dist

    - name: Create distributable zip
      shell: pwsh
      run: Compress-Archive -Path dist/* -DestinationPath GameInputTester-win-x64.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameInputTester-win-x64
        path: GameInputTester-win-x64.zip
        if-no-files-found: error
        retention-days: 30
